<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0a0a06" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="CanvasQuest" />
  <title>CanvasQuest</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── Landing / Setup ── -->
  <div id="setup-modal" class="landing" hidden>
    <!-- Sparkles -->
    <span class="sparkle" style="top:22%;left:14%;width:5px;height:5px;animation-delay:0s;animation-duration:5s"></span>
    <span class="sparkle" style="top:34%;left:86%;width:4px;height:4px;animation-delay:1.2s;animation-duration:6.5s"></span>
    <span class="sparkle" style="top:58%;left:10%;width:3px;height:3px;animation-delay:2.4s;animation-duration:5.5s"></span>
    <span class="sparkle" style="top:48%;left:90%;width:3px;height:3px;animation-delay:0.6s;animation-duration:6s"></span>
    <span class="sparkle" style="top:68%;left:78%;width:5px;height:5px;animation-delay:1.8s;animation-duration:7s"></span>
    <span class="sparkle" style="top:14%;left:48%;width:3px;height:3px;animation-delay:3s;animation-duration:5s"></span>

    <!-- Top bar -->
    <div class="landing-top">
      <div class="brand-mark">
        <svg class="brand-glyph" viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
          <g stroke="currentColor" stroke-width="1.6" stroke-linecap="round" fill="none">
            <path d="M12 2 L12 22"/><path d="M2 12 L22 12"/>
            <path d="M5 5 L19 19"/><path d="M19 5 L5 19"/>
          </g>
        </svg>
        <span class="brand-text">CANVAS·QUEST</span>
      </div>
      <button class="skip-btn" id="btn-demo">Try Demo</button>
    </div>

    <!-- Hero: hat -->
    <div class="landing-hero">
      <div class="hat-stage">
        <div class="hat-halo"></div>
        <img class="hat-img" src="assets/wizard-hat.png" alt="" />
        <div class="hat-shadow"></div>
      </div>

      <div class="landing-copy">
        <div class="landing-eyebrow mono">Chapter 01 · The Awakening</div>
        <h1 class="display landing-title">
          What kind of <em>wizard</em><br/>would you like to be?
        </h1>
        <p class="landing-sub">
          Turn your Canvas coursework into a quest log. Earn coins, level up, never let a scroll go overdue.
        </p>
      </div>
    </div>

    <!-- Setup form -->
    <div class="landing-form-wrap">
      <form id="setup-form" novalidate>
        <div class="setup-field">
          <label for="input-domain" class="mono">Canvas Domain</label>
          <input id="input-domain" type="text" placeholder="canvas.asu.edu"
            autocomplete="off" autocapitalize="none" spellcheck="false" />
        </div>
        <div class="setup-field">
          <label for="input-token" class="mono">Access Token</label>
          <div class="input-wrap">
            <input id="input-token" type="password" placeholder="Paste your Canvas token" autocomplete="off" />
            <button type="button" class="toggle-vis" data-target="input-token" aria-label="Show/hide">
              <span class="eye-icon">👁</span>
            </button>
          </div>
        </div>
        <div class="setup-field">
          <label for="input-username" class="mono">Display Name</label>
          <input id="input-username" type="text" placeholder="Your wizard name" autocomplete="off" />
        </div>
        <p class="form-error" id="setup-error" hidden></p>
        <button type="submit" class="btn-primary btn-block">
          Begin Quest
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
        </button>
      </form>
      <div class="page-dots">
        <span class="page-dot active"></span>
        <span class="page-dot"></span>
        <span class="page-dot"></span>
      </div>
    </div>
  </div>

  <!-- ── App Shell ── -->
  <div id="shell" hidden>
    <main id="app" class="app-content" role="main"></main>

    <nav class="tabbar" role="navigation" aria-label="Main navigation">
      <button class="tabbar-item" data-tab="quests" aria-label="Quests">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H8a3 3 0 0 1-3-3V5a2 2 0 0 1 2-2h11l-1 4v13a3 3 0 0 0 3 3z"/><path d="M19 21a3 3 0 0 0 3-3v-2h-6"/></svg>
        <span>Quests</span>
      </button>
      <button class="tabbar-item" data-tab="leaderboard" aria-label="Leaderboard">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="3 6 9 3 15 6 21 3 21 18 15 21 9 18 3 21 3 6"/><line x1="9" y1="3" x2="9" y2="18"/><line x1="15" y1="6" x2="15" y2="21"/></svg>
        <span>Realms</span>
      </button>
      <button class="tabbar-item" data-tab="guild" aria-label="Guild">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 15 9 22 9 16.5 14 18.5 21 12 17 5.5 21 7.5 14 2 9 9 9 12 2"/></svg>
        <span>Guild</span>
      </button>
      <button class="tabbar-item" data-tab="profile" aria-label="Profile">
        <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/></svg>
        <span>Hero</span>
      </button>
    </nav>
  </div>

  <script src="app.js"></script>
</body>
</html>
